# cpp_media – image processing (resize, thumbnail, format conversion)
# Source: cpp_media/main.cpp
# Error responses: see error-response.md (standard shape: error.code, error.message, error.correlation_id)

endpoints:
  - endpoint: /health
    method: GET
    request_schema: null
    response_schema:
      status: string
      service: string
    error_schema: null

  - endpoint: /process
    method: POST
    request_schema:
      option_a_multipart:
        file: binary  # required
        thumbnail_size: number  # optional, default 256
        resize_max: number     # optional, default 1200
        output_format: string  # optional, e.g. jpg, png
        operations: string     # optional, e.g. thumbnail,resize
      option_b_json:
        image_base64: string   # required
        thumbnail_size: number # optional
        resize_max: number     # optional
        output_format: string  # optional
        operations: string     # optional
    response_schema:
      thumbnail_base64: string
      thumbnail_content_type: string
      processed_base64: string      # optional; present when resize requested
      processed_content_type: string # optional
    error_schema: error-response.md  # 400 invalid_request, 422 validation_error
