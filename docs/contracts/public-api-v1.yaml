# Public API v1 – OpenAPI 3.0
# Canonical contract for the .NET gateway. All /api/v1/* routes.
# Error shape matches docs/contracts/error-response.md

openapi: 3.0.3
info:
  title: ForgeAI Public API
  description: |
    Versioned public API for ForgeAI. The gateway validates API key and request
    payloads, then proxies to Rails (source of truth for workflows, jobs, assets).
  version: "1.0"
  contact: {}

servers:
  - url: http://localhost:5001
    description: Local development

security:
  - ApiKey: []

paths:
  /health:
    get:
      summary: Health check
      description: No authentication required.
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"

  /api/v1/generate:
    post:
      summary: Create generation job
      description: Submit a prompt to create a generation job (or workflow run). Rails enqueues work and returns job/run identifiers.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateRequest"
      responses:
        "201":
          description: Job or workflow run created
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/GenerateJobResponse"
                  - $ref: "#/components/schemas/GenerateWorkflowResponse"
        "400":
          description: Invalid request (e.g. missing or invalid prompt)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Rails service unavailable or timeout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/jobs/{id}:
    get:
      summary: Get job status
      description: Poll job status after create. Returns job_id, status, timestamps, optional error_message and asset_id.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "400":
          description: Invalid request (e.g. missing id)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Rails service unavailable or timeout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/assets:
    get:
      summary: List assets
      description: List assets for the API user. Optional semantic search when index service is configured.
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Optional search query (semantic search via index service)
      responses:
        "200":
          description: Array of assets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Asset"
          headers:
            X-Search-Status:
              description: Present when search was used (e.g. ok, starting_up)
              schema:
                type: string
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Rails service unavailable or timeout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/search:
    get:
      summary: Search assets
      description: Semantic search over assets. Proxies to same backend as GET /api/v1/assets?search=...
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Array of assets matching the query
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Asset"
          headers:
            X-Search-Status:
              description: Present when search was used
              schema:
                type: string
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Rails service unavailable or timeout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/assets/{id}:
    get:
      summary: Get asset by id
      description: Single asset detail.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Asset object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"
        "400":
          description: Invalid request (e.g. missing id)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Asset not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Rails service unavailable or timeout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    ApiKey:
      type: apiKey
      in: header
      name: X-Api-Key
      description: API key (required when gateway has ApiKey configured)

  schemas:
    Health:
      type: object
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: dotnet_api

    Error:
      description: Standard error shape (see docs/contracts/error-response.md)
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
            - correlation_id
          properties:
            code:
              type: string
              description: Machine-readable code (e.g. invalid_request, unauthorized, not_found, bad_gateway)
            message:
              type: string
              description: Human-readable message
            correlation_id:
              type: string
              description: Request trace id for log correlation

    GenerateRequest:
      type: object
      required:
        - prompt
      properties:
        prompt:
          type: string
          minLength: 1
          maxLength: 10000

    GenerateJobResponse:
      type: object
      properties:
        job_id:
          type: integer
        status:
          type: string
          example: queued

    GenerateWorkflowResponse:
      type: object
      properties:
        workflow_run_id:
          type: integer
        status:
          type: string
          example: queued

    Job:
      type: object
      properties:
        job_id:
          type: integer
        status:
          type: string
          enum: [queued, running, completed, failed]
        created_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        error_message:
          type: string
          nullable: true
        asset_id:
          type: integer
          nullable: true
          description: Present when status is completed and asset exists

    Asset:
      type: object
      properties:
        id:
          type: integer
        created_at:
          type: string
          format: date-time
        prompt:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
        download_url:
          type: string
          nullable: true
        thumbnail_url:
          type: string
          nullable: true
        processed_files:
          type: array
          items:
            type: object
            properties:
              profile:
                type: string
              download_url:
                type: string
